<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table -Creation</title>
</head>
<body>
    <table border="black">
        <caption>Food Items List</caption>
        <thead>
        <tr>
            <th rowspan="2"> Item</th>
            <th colspan="2">Price</th>
            
        </tr>
        <tr>
            <th>INR</th>
            <th>USD</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            
            <th>Frooti</th>
            <th>50</th>
            <th>0.52</th>
        </tr>
        <tr>
            <th>Mango</th>
            <th>80</th>
            <th>0.84</th>

        </tr>
        <tr>
            <th>Coconut</th>
            <th>100</th>
            <th>1.05</th>
        </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Sum</th>
                <th>230</th>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
